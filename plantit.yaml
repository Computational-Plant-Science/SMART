name: "SMART: Speedy Measurement of Arabidopsis Rosette Traits"
author: Suxing Liu
public: True
doi: 10.1101/2021.12.17.472861
image: docker://computationalplantscience/smart

commands: python3 /opt/smart/core/trait_extract_parallel_demo.py -p $INPUT -o $OUTPUT --color_space $COLOR_SPACE --channels $CHANNELS --num_clusters $NUM_CLUSTERS --min_size $MIN_SIZE --max_size $MAX_SIZE --min_dist $MIN_DIST --diagonal $DIAGONAL 


input:
  kind: files
  filetypes:
    - jpg
output:
  include:
    patterns:
      - xlsx
logo: media/Smart.png

jobqueue:
  walltime: "04:00:00"
  memory: "8GB"
  processes: 1
  cores: 12

params:
  - name: color-space
    type: String
    default: lab
  - name: channels
    type: String
    default: 1
  - name: num-clusters
    type: number
    default: 2
    step: 1
    min: 2
    max: 5
  - name: min_size
    type: number
    default: 10000
    step: 100
    min: 100
    max: 2000
  - name: max_size
    type: number
    default: 1000000
    step: 1000
    min: 100000
    max: 10000000
  - name: min_dist
    type: number
    default: 50
    step: 1
    min: 15
    max: 100
  - name: diagonal
    type: number
    default: 1.41421356237
    step: 1
    min: 1
    max: 10
    

