name: "SMART: Speedy Measurement of Arabidopsis Rosette Traits"
author: Suxing Liu
public: True
clone: True
image: docker://computationalplantscience/smart
commands: /opt/smart/plantit_pipeline.sh
logo: media/rosette.jpg

input:
  kind: directory
  path:
  filetypes:
    - jpg
    - png

output:
  path:
  include:
    patterns:
      - xlsx

jobqueue:
  walltime: "04:00:00"
  memory: "8GB"
  processes: 1
  cores: 12
