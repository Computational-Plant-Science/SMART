name: "SMART: Speedy Measurement of Arabidopsis Rosette Traits"
author: Suxing Liu
public: True
doi: 10.1101/2021.12.17.472861
image: docker://computationalplantscience/smart

commands: /opt/smart/plantit_pipeline.sh

logo: media/Smart.png

jobqueue:
  walltime: "02:00:00"
  memory: "8GB"
  processes: 1
  cores: 12

  
params:
  - name: Multiple
    type: boolean
    default: False
    
input:
  kind: directory
  path:
  filetypes:
    - jpg
    - png
output:
  path:
  include:
    patterns:
      - xlsx
